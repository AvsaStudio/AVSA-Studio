services:
  db:
    image: postgres:16
    container_name: avsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avsa_studio
    ports:
      - "5432:5432"
    volumes:
      - avsa_postgres_data:/var/lib/postgresql/data

volumes:
  avsa_postgres_data:
